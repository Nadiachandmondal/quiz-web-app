<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quizadilla</title>
  <link rel="stylesheet" href="quiz.css" />
</head>
<body>

  <div class="background-layer">
    <!-- MATH SYMBOLS -->
    <span class="shape math color-purple pos-tl">π</span>
    <span class="shape math color-yellow pos-tr">∑</span>
    <span class="shape math color-pink pos-ml">∫</span>
    <span class="shape math color-green pos-mr">√</span>
    <span class="shape fn color-red pos-bl">a² + b² = c²</span>
  
    <!-- LETTERS -->
    <span class="shape alpha color-purple pos-tc">X</span>
    <span class="shape alpha color-yellow pos-bp">Y</span>
    <span class="shape alpha color-green pos-bc">A</span>
  
    <!-- WORDS -->
    <span class="shape word color-red pos-mc">solve</span>
  
    <!-- GEOMETRIC SHAPES -->
    <div class="shape circle pos-mp"></div>
    <div class="shape cube pos-br"></div>
  </div>    

  <header class="navbar">
    <nav>
      <a href="aboutus.html">About Us</a>
      <a href="help.html">Help</a>
    </nav>
  </header>

  <main class="main-content">
    <h1 class="title">QUIZADILLA</h1>
    <p class="subtext">HERE TO SERVE YOU WITH FRESHLY SERVED QUIZZES<br />SLAY IT BABYGIRLS</p>

    <div class="dropdowns">
      <select id="age-group">
        <option value="">Age Group</option>
      </select>
      <select id="subject">
        <option value="">Subject</option>
      </select>
      <button id="done-btn">Done</button>
    </div>
  </main>

  <footer class="footer">
    &copy; 2025 Quizadilla
  </footer>

  <script src="script.js"></script>
</body>
</html>
